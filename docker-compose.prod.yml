# Production stack: only Caddy is exposed to the internet (TLS on 80/443).
# DB, Redis, backend and frontend stay inside the compose network.
# Run: docker compose -f docker-compose.prod.yml up -d
# Adminer is intentionally omitted in prod — reach the DB via an SSH tunnel instead.
services:
  db:
    image: postgres:15-alpine
    container_name: adsicrm-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-adsicrm_database}
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: adsicrm-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data

  backend:
    image: ghcr.io/adsicrm/adsicrm-backend:1.0.6
    platform: linux/amd64
    container_name: adsicrm-backend
    restart: always
    env_file:
      - .env
    # No published port — reachable only via the frontend proxy inside the network.
    depends_on:
      - db
      - redis

  frontend:
    image: ghcr.io/adsicrm/adsicrm-frontend:0.1.2
    platform: linux/amd64
    container_name: adsicrm-frontend
    restart: always
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:3000}
    # No public port — Caddy terminates TLS and proxies to it inside the network.
    expose:
      - "3000"
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    container_name: adsicrm-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  db_data:
  redis_data:
  caddy_data:
  caddy_config:
