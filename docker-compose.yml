services:
  db:
    image: postgres:15-alpine
    container_name: adsicrm-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-adsicrm_database}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  db-admin:
    image: adminer:latest
    container_name: adsicrm-adminer
    restart: always
    ports:
      - "${ADMINER_PORT:-8978}:8080"
    volumes:
      - ./src/common/adminer.css:/var/www/html/adminer.css:ro
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    container_name: adsicrm-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data

  backend:
    image: ghcr.io/adsicrm/adsicrm-backend:1.0.5
    platform: linux/amd64
    container_name: adsicrm-backend
    restart: always
    env_file:
      - .env
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      - db
      - redis

  frontend:
    image: ghcr.io/adsicrm/adsicrm-frontend:latest
    platform: linux/amd64
    container_name: adsicrm-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3001}:3000"
    depends_on:
      - backend

volumes:
  db_data:
  redis_data: